# API 测试套件 CI/CD 配置
# 适用于 GitHub Actions

name: API Regression Test

# 触发条件
on:
  # 定时触发（每天凌晨）
  schedule:
    - cron: '0 2 * * *'
  
  # API 文档变更时触发
  push:
    paths:
      - 'api_test_suite/**'
      - 'openapi.yaml'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: '运行环境'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging

# 环境变量
env:
  PYTHON_VERSION: '3.10'

# 作业定义
jobs:
  # API 回归测试
  regression-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: test
            base_url: 'http://106.227.91.110:31000/api'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r api_test_suite/requirements.txt
      
      - name: Run regression tests
        run: |
          cd api_test_suite
          pytest test_order_submit.py -v -s --tb=short \
            --junitxml=results.xml \
            --html=report.html
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            api_test_suite/results.xml
            api_test_suite/report.html
          retention-days: 30

  # 通知
  notify:
    needs: regression-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send notification on failure
        if: needs.regression-test.result == 'failure'
        run: |
          echo "API 回归测试失败!"
          # 可配置 Slack 通知
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text": "API 回归测试失败!"}'
