# API 测试套件 CI/CD 配置

name: API Regression Test

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    paths:
      - 'api_test_suite/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:
  # Mock 测试 - 不依赖真实 API
  mock-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pytest-html
      
      - name: Run mock tests
        run: |
          cd api_test_suite
          pytest test_mock.py -v --tb=short --html=mock_report.html
      
      - name: Upload mock test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mock-test-results
          path: |
            api_test_suite/mock_report.html
          retention-days: 30

  # 真实 API 测试（可选，需要配置 secrets）
  api-test:
    needs: mock-test
    runs-on: ubuntu-latest
    if: false  # 暂时禁用，需要配置 secrets 后启用
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pytest-html
      
      - name: Run API tests
        run: |
          cd api_test_suite
          pytest test_order_submit.py -v --tb=short || true
      
      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            api_test_suite/*.xml
            api_test_suite/*.html
          retention-days: 30
