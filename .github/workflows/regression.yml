# API 测试套件 CI/CD 配置
name: API Regression Test

on:
  schedule:
    - cron: &#x27;0 2 * * *'
  push:
    paths:
      - &#x27;api_test_suite/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: &#x27;3.10'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Run simple test
        run: |
          python --version
          pip install pytest
          cd api_test_suite
          python -m pytest test_simple.py -v
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: api_test_suite/.pytest_cache
          retention-days: 30
