# API 测试套件 CI/CD 配置

name: API Regression Test

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    paths:
      - 'api_test_suite/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:
  regression-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pytest-html
      
      - name: List files
        run: |
          echo "=== Repository structure ==="
          ls -la
          echo "=== api_test_suite directory ==="
          ls -la api_test_suite/ || echo "Directory not found"
      
      - name: Run simple test
        run: |
          cd api_test_suite
          python -c "
          import requests
          print('Testing API connection...')
          try:
              resp = requests.get('http://106.227.91.110:31000/api', timeout=10)
              print(f'Status: {resp.status_code}')
          except Exception as e:
              print(f'Error: {e}')
          "
      
      - name: Run pytest
        run: |
          cd api_test_suite
          pytest test_order_submit.py::TestOrderSubmit::test_submit_order_success -v --tb=long || echo "Test completed with errors"
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            api_test_suite/*.xml
            api_test_suite/*.html
          retention-days: 30
          if-no-files-found: ignore
