# API 测试套件 CI/CD 配置

name: API Regression Test

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    paths:
      - 'api_test_suite/**'
      - 'openapi.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: '运行环境'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging

env:
  PYTHON_VERSION: '3.10'

jobs:
  regression-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pytest-html allure-pytest
      
      - name: Run regression tests
        run: |
          cd api_test_suite
          pytest test_order_submit.py -v --tb=short \
            --junitxml=results.xml \
            --html=report.html || true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            api_test_suite/results.xml
            api_test_suite/report.html
          retention-days: 30

  notify:
    needs: regression-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check result
        run: |
          echo "Test completed. Check artifacts for results."
